services:
  db:
    image: postgres:16-alpine
    container_name: learnx-postgres
    environment:
      POSTGRES_DB: ${LEARNX_DB_NAME:-learnx}
      POSTGRES_USER: ${LEARNX_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${LEARNX_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    depends_on:
      - db
    build:
      context: .
      dockerfile: Dockerfile
    image: learnx-api:local
    container_name: learnx-api
    ports:
      - "8080:8080"
    environment:
      - LEARNX_DB_URL=${LEARNX_DB_URL:-jdbc:postgresql://db:5432/learnx}
      - LEARNX_DB_USERNAME=${LEARNX_DB_USERNAME:-postgres}
      - LEARNX_DB_PASSWORD=${LEARNX_DB_PASSWORD:-postgres}
      - LEARNX_JPA_DDL_AUTO=${LEARNX_JPA_DDL_AUTO:-update}
      - LEARNX_JPA_SHOW_SQL=${LEARNX_JPA_SHOW_SQL:-false}
      - LEARNX_JPA_FORMAT_SQL=${LEARNX_JPA_FORMAT_SQL:-false}
      - LEARNX_GEMINI_API_KEY=${LEARNX_GEMINI_API_KEY:-}
      - LEARNX_TAVILY_API_KEY=${LEARNX_TAVILY_API_KEY:-}
      - LEARNX_GEMINI_MODEL=${LEARNX_GEMINI_MODEL:-gemini-2.5-flash}
      - LEARNX_REQUEST_TIMEOUT_SECONDS=${LEARNX_REQUEST_TIMEOUT_SECONDS:-20}
      - LEARNX_SEARCH_MAX_RESULTS=${LEARNX_SEARCH_MAX_RESULTS:-5}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: learnx-web:local
    container_name: learnx-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
