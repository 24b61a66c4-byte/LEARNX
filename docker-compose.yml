services:
  db:
    image: mysql:8.4
    container_name: learnx-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: learnx
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  api:
    depends_on:
      - db
    build:
      context: .
      dockerfile: Dockerfile
    image: learnx-api:local
    container_name: learnx-api
    ports:
      - "8080:8080"
    environment:
      - LEARNX_GEMINI_API_KEY=${LEARNX_GEMINI_API_KEY}
      - LEARNX_TAVILY_API_KEY=${LEARNX_TAVILY_API_KEY}
      - LEARNX_GEMINI_MODEL=${LEARNX_GEMINI_MODEL:-gemini-2.5-flash}
      - LEARNX_REQUEST_TIMEOUT_SECONDS=${LEARNX_REQUEST_TIMEOUT_SECONDS:-20}
      - LEARNX_SEARCH_MAX_RESULTS=${LEARNX_SEARCH_MAX_RESULTS:-5}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: learnx-web:local
    container_name: learnx-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
