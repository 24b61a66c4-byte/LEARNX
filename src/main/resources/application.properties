spring.application.name=learnx-api
spring.config.import=optional:file:.env.local[.properties]
server.port=${SERVER_PORT:8080}

# Database (PostgreSQL / Supabase)
spring.datasource.url=${LEARNX_DB_URL:jdbc:postgresql://localhost:5432/learnx}
spring.datasource.username=${LEARNX_DB_USERNAME:postgres}
spring.datasource.password=${LEARNX_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${LEARNX_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${LEARNX_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${LEARNX_JPA_FORMAT_SQL:false}

# Logging
logging.level.com.learnx=INFO
logging.level.root=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
