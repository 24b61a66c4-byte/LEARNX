spring.application.name=learnx-api
spring.config.import=optional:file:.env.local[.properties]
server.port=${SERVER_PORT:${PORT:8080}}

# Database (PostgreSQL / Supabase, with an in-memory H2 fallback for hosted demo deploys)
spring.datasource.url=${LEARNX_DB_URL:jdbc:h2:mem:learnx;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${LEARNX_DB_USERNAME:sa}
spring.datasource.password=${LEARNX_DB_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${LEARNX_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${LEARNX_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${LEARNX_JPA_FORMAT_SQL:false}

# Logging
logging.level.com.learnx=INFO
logging.level.root=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
