spring.application.name=learnx-api
spring.config.import=optional:file:.env.local[.properties]
server.port=${SERVER_PORT:${PORT:8080}}

# Database (PostgreSQL / Supabase, with an in-memory H2 fallback for hosted demo deploys)
spring.datasource.url=${LEARNX_DB_URL:jdbc:h2:mem:learnx;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${LEARNX_DB_USERNAME:sa}
spring.datasource.password=${LEARNX_DB_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${LEARNX_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${LEARNX_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${LEARNX_JPA_FORMAT_SQL:false}

# Logging
logging.level.com.learnx=INFO
logging.level.root=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Security (Supabase/OIDC JWT)
learnx.security.jwt.issuer-uri=${LEARNX_JWT_ISSUER_URI:}
learnx.security.jwt.jwk-set-uri=${LEARNX_JWT_JWK_SET_URI:}
learnx.security.jwt.secret=${LEARNX_JWT_SECRET:}

# Strict CORS origins (comma-separated)
learnx.security.cors.allowed-origins=${LEARNX_ALLOWED_ORIGINS:http://localhost:3000}

# API rate limiting
learnx.rate-limit.enabled=${LEARNX_RATE_LIMIT_ENABLED:false}
learnx.rate-limit.capacity=${LEARNX_RATE_LIMIT_CAPACITY:120}
learnx.rate-limit.refill-tokens=${LEARNX_RATE_LIMIT_REFILL_TOKENS:120}
learnx.rate-limit.refill-minutes=${LEARNX_RATE_LIMIT_REFILL_MINUTES:1}

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.tracing.sampling.probability=${LEARNX_TRACING_SAMPLING:0.1}

# Flyway migrations
spring.flyway.enabled=${LEARNX_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
