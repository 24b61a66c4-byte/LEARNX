# Development profile - disable Flyway migrations for H2 in-memory DB
# Flyway migrations target PostgreSQL syntax which H2 doesn't support
spring.flyway.enabled=false

# Don't auto-generate DDL - H2 doesn't support PostgreSQL array types in entities
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Logging
logging.level.com.learnx=DEBUG
logging.level.root=WARN

# Simpler JWT secret for local dev (min 32 chars)
learnx.security.jwt.secret=learnx-local-dev-secret-key-min-32-chars-for-hs256
